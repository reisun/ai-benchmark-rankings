name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Run daily at 09:00 JST (00:00 UTC) to refresh data
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install datasets pandas

      - name: Fetch latest benchmark data
        run: python scripts/fetch_data.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,scripts,TASK.md,.gitignore'
          force_orphan: true
          commit_message: 'deploy: update benchmark data (${{ github.sha }})'
